debug: true
server:
  port: 8081
  servlet:
    context-path: /auth

spring:
  application:
    name: commerce-auth-service
  messages:
    basename: i18n/messages
    encoding: UTF-8
    default-locale: en
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  profiles:
    active: dev

  datasource:
    url: JDBC:mysql://127.0.0.1:3306/commerce_auth
    username: commerce_dev
    password: Bnroll@2003
    driver-class-name: com.mysql.cj.jdbc.Driver

    Hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.bnroll: DEBUG
    org.springframework.security: INFO

jwt:
  secret: my-super-secret-key-my-super-secret-key
  expiration: 86400000


spring doc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
